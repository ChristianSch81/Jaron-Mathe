  &lt;script&gt;

      {level:&#x27;Leicht · 1&#x27;,prompt:&#x27;Welche Einheit passt zu einer Bleistiftspitze?&#x27;,type:&#x27;choice&#x27;,choices:[&#x27;mm&#x27;,&#x27;cm&#x27;,&#x27;m&#x27;],answer:&#x27;mm&#x27;,hint:&#x27;Sie ist nur sehr dünn.&#x27;,explain:&#x27;Sehr kleine Längen misst man in Millimetern.&#x27;},
