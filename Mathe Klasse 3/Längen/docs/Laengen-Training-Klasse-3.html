  &lt;script&gt;
  (()=&gt;{
    const root=document.getElementById(&#x27;length-coach&#x27;), q=s=&gt;root.querySelector(s);
    const factors={mm:.001,cm:.01,dm:.1,m:1,km:1000};
    const format=n=&gt;new Intl.NumberFormat(&#x27;de-DE&#x27;,{maximumFractionDigits:6}).format(Number(n.toFixed(6)));
    function updateConverter(){
      const raw=q(&#x27;#lc-value&#x27;).value.trim().replace(&#x27;,&#x27;,&#x27;.&#x27;); const n=Number(raw),from=q(&#x27;#lc-from&#x27;).value,to=q(&#x27;#lc-to&#x27;).value;
      if(!Number.isFinite(n)){q(&#x27;#lc-convert-result&#x27;).textContent=&#x27;Bitte gib eine Zahl ein.&#x27;;return}
      const metres=n*factors[from],out=metres/factors[to],ratio=factors[from]/factors[to];
      q(&#x27;#lc-convert-result&#x27;).innerHTML=&#x27;&lt;strong&gt;&#x27;+format(n)+&#x27; &#x27;+from+&#x27; = &#x27;+format(out)+&#x27; &#x27;+to+&#x27;&lt;/strong&gt;&#x27;;
      q(&#x27;#lc-convert-tip&#x27;).textContent=ratio&gt;1?&#x27;Du gehst zu einer kleineren Einheit: Die Zahl wird größer.&#x27;:ratio&lt;1?&#x27;Du gehst zu einer größeren Einheit: Die Zahl wird kleiner.&#x27;:&#x27;Die Einheit bleibt gleich.&#x27;;
      const mm=Math.round(Math.abs(metres)*1000), powers=[1000000,100000,10000,1000,100,10,1];
      [...q(&#x27;#lc-place-row&#x27;).children].forEach((cell,i)=&gt;cell.textContent=Math.floor(mm/powers[i])%10);
    }
